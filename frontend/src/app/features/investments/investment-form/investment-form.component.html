<h2 mat-dialog-title>Add Investment</h2>

<mat-dialog-content [formGroup]="form">
  <mat-form-field class="full-width">
    <mat-label>Asset Symbol</mat-label>
    <input matInput formControlName="asset_symbol" placeholder="e.g. AAPL" style="text-transform: uppercase">
    @if (form.get('asset_symbol')!.hasError('required')) {
      <mat-error>Required</mat-error>
    }
  </mat-form-field>

  <mat-form-field class="full-width">
    <mat-label>Type</mat-label>
    <mat-select formControlName="type">
      <mat-option value="buy">Buy</mat-option>
      <mat-option value="sell">Sell</mat-option>
      <mat-option value="dividend">Dividend</mat-option>
    </mat-select>
  </mat-form-field>

  <div class="row-2">
    <mat-form-field>
      <mat-label>Quantity</mat-label>
      <input matInput type="number" formControlName="quantity" placeholder="0">
    </mat-form-field>

    <mat-form-field>
      <mat-label>Price per unit</mat-label>
      <span matTextPrefix>$&nbsp;</span>
      <input matInput type="number" formControlName="price" placeholder="0.00">
    </mat-form-field>
  </div>

  <mat-form-field class="full-width">
    <mat-label>Amount</mat-label>
    <span matTextPrefix>$&nbsp;</span>
    <input matInput type="number" formControlName="amount" placeholder="0.00">
    @if (form.get('amount')!.hasError('required')) {
      <mat-error>Required</mat-error>
    }
    <mat-hint>Auto-calculated from quantity × price</mat-hint>
  </mat-form-field>

  <mat-form-field class="full-width">
    <mat-label>Date</mat-label>
    <input matInput [matDatepicker]="picker" formControlName="date">
    <mat-datepicker-toggle matIconSuffix [for]="picker" />
    <mat-datepicker #picker />
  </mat-form-field>

  <mat-form-field class="full-width">
    <mat-label>Notes (optional)</mat-label>
    <textarea matInput formControlName="notes" rows="2"></textarea>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="form.invalid || saving">
    @if (saving) {
      <mat-spinner diameter="20" />
    } @else {
      Save
    }
  </button>
</mat-dialog-actions>
