name: investflow

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: investflow
      POSTGRES_PASSWORD: investflow
      POSTGRES_DB: investflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://investflow:investflow@db:5432/investflow
      NODE_ENV: development
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
    depends_on:
      - db

volumes:
  postgres_data:
