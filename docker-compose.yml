version: '3.9'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: investflow
      POSTGRES_PASSWORD: investflow
      POSTGRES_DB: investflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://investflow:investflow@db:5432/investflow
      NODE_ENV: development
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '4200:80'
    depends_on:
      - backend

volumes:
  postgres_data:
